name: Build Pi 5 OpenWrt

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 1. Check out the official
      - name: Checkout OpenWrt source
        uses: actions/checkout@v4
        with:
          repository: openwrt/openwrt
          ref: v25.12.4 # Replace with the exact tag you want to build

      # 2. Check out repository into a folder for pi5.config
      - name: Checkout own repo files
        uses: actions/checkout@v4
        with:
          path: my_files

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses-dev libssl-dev python3-setuptools rsync unzip zlib1g-dev file wget

      # 4. OpenWrt feed preparation
      - name: Update and install feeds
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      # 5. Inject custom packages
      - name: Clone custom GitHub packages
        run: |
          mkdir -p package/custom_apps
          git clone https://github.com/timsaya/openwrt-bandix.git package/custom_apps/openwrt-bandix
          git clone https://github.com/timsaya/luci-app-bandix.git package/custom_apps/luci-app-bandix

      # 6. Apply config seed AND set custom packages
      - name: Load custom config
        run: |
          mv my_files/pi5.config .config

          echo "CONFIG_PACKAGE_bandix=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-bandix=y" >> .config

          echo "CONFIG_PACKAGE_kmod-lib-textsearch=y" >> .config

          make defconfig

      # 7. Download all C-code dependencies
      - name: Download packages
        run: make download -j8

      # 8. Start compile
      - name: Compile OpenWrt
        run: make -j$(nproc) || make -j1 V=s

      # 9. Push compiled binaries to GitHub Pages
      - name: Deploy Packages to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./bin/
          publish_branch: gh-pages
